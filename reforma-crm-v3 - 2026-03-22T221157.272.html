<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>IDG · Innovate Design Group</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;font-family:'Inter',sans-serif;background:#f5f4f0;color:#1a1a1a}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d0cec8;border-radius:3px}
input,select,textarea,button{font-family:'Inter',sans-serif}
@media(max-width:768px){
  body,#root{overflow-x:hidden}
  input,select,textarea{font-size:16px!important}
  button{min-height:36px}
  table{display:block!important;overflow-x:auto!important;-webkit-overflow-scrolling:touch;white-space:nowrap}
}
@media(max-width:768px) and (display-mode:standalone){
  .app-shell-sidebar{padding-bottom:env(safe-area-inset-bottom,16px)!important}
}
@media print{
  body>#root>div>div:first-child{display:none!important}
  .no-print{display:none!important}
  body{background:white;margin:0;padding:0}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
}
</style>

  <script>
    (function(){
      try{
        const cfg={apiKey:"AIzaSyCdLxTCwJw3Y9EGW7HxxrwHICFpfKUy6gY",authDomain:"idg---crm.firebaseapp.com",projectId:"idg---crm",storageBucket:"idg---crm.firebasestorage.app",messagingSenderId:"146415117375",appId:"1:146415117375:web:5a09d3c68f2508713e048a"};
        firebase.initializeApp(cfg);
        const db=firebase.firestore();
        const DR=db.collection("crm").doc("main");
        const UR=db.collection("crm").doc("users");
        window._fbSet=async function(k,v){try{await DR.set({[k]:JSON.stringify(v)},{merge:true});}catch(e){}};
        window._fbGetAll=async function(){try{const s=await DR.get();if(!s.exists)return null;const r=s.data(),res={};for(const[k,v]of Object.entries(r)){try{res[k]=JSON.parse(v);}catch(ex){res[k]=v;}}return res;}catch(e){return null;}};
        window._fbSubscribe=function(cb){return DR.onSnapshot(function(s){if(!s.exists)return;const r=s.data(),res={};for(const[k,v]of Object.entries(r)){try{res[k]=JSON.parse(v);}catch(ex){res[k]=v;}}cb(res);},function(e){});};
        window._fbGetUsers=async function(){try{const s=await UR.get();if(!s.exists)return null;const r=s.data();return r.list?JSON.parse(r.list):null;}catch(e){return null;}};
        window._fbSaveUsers=async function(u){try{await UR.set({list:JSON.stringify(u)},{merge:true});}catch(e){}};
        window._firebaseReady=true;window.dispatchEvent(new Event("firebase-ready"));
        console.log("Firebase conectado");
      }catch(e){console.warn(e);window.dispatchEvent(new Event("firebase-ready"));}
    })();
  </script>
